name: PR Validation
on:
  pull_request:
    types: [opened, synchronize, reopened]
concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  pr-validation:
    name: Check targeting -> Check Widgets/ Changed -> Validate
    runs-on: ubuntu-slim
    if: "!(github.base_ref == 'main' && github.head_ref == 'testing')"
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check targeting
        id: check_targeting
        continue-on-error: true
        run: |
          if [ "${{ github.base_ref }}" != "testing" ]; then
            echo "PR must target the \`testing\` branch." > targeting_error.txt
            exit 1
          fi

      - name: Check Widgets/ Changed
        id: check_files
        continue-on-error: true
        run: |
          changed=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD)
          echo "Changed files:"
          echo "$changed"
          invalid=$(echo "$changed" | grep -v '^widgets/' | grep -v '^\s*$' || true)
          if [ -n "$invalid" ]; then
            echo "$invalid" > invalid_files.txt
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate
        id: validate
        continue-on-error: true
        run: |
          npm ci
          node scripts/validate-widgets.js > validation.txt 2>&1 || exit 1

      - name: Post consolidated comment
        if: >
          steps.check_targeting.outcome == 'failure' ||
          steps.check_files.outcome == 'failure' ||
          steps.validate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const sections = [];

            if ('${{ steps.check_targeting.outcome }}' === 'failure') {
              sections.push('### ❌ Invalid target branch\n\nPR must target the `testing` branch.');
            }

            if ('${{ steps.check_files.outcome }}' === 'failure') {
              let files = '';
              try { files = fs.readFileSync('invalid_files.txt', 'utf8').trim(); } catch {}
              sections.push(
                '### ❌ Files outside `widgets/`\n\n' +
                'Only files under `widgets/` may be changed in a PR.\n\n' +
                '```\n' + files + '\n```'
              );
            }

            if ('${{ steps.validate.outcome }}' === 'failure') {
              let output = '';
              try { output = fs.readFileSync('validation.txt', 'utf8').trim(); } catch {}
              sections.push('### ❌ Widget validation failed\n\n```\n' + output + '\n```');
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body:
                '## ❌ PR validation failed\n\n' +
                'Please fix the following before merging:\n\n' +
                sections.join('\n\n---\n\n'),
            });

      - name: Fail if any checks failed
        if: >
          steps.check_targeting.outcome == 'failure' ||
          steps.check_files.outcome == 'failure' ||
          steps.validate.outcome == 'failure'
        run: exit 1
